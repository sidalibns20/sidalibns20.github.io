<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحتي الخاصة</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            text-align: center;
            padding: 50px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👋 مرحباً بك في صفحتي</h1>
        <p>شكراً لزيارتك</p>
    </div>

    <script>
        // دالة لجمع معلومات الزائر
        async function sendNotification() {
            try {
                // 1. الحصول على معلومات الموقع الجغرافي
                const ipResponse = await fetch('https://ipapi.co/json/');
                const ipData = await ipResponse.json();
                
                // 2. معلومات المتصفح
                const browserInfo = navigator.userAgent;
                
                // 3. توقيت الزيارة
                const visitTime = new Date().toLocaleString('ar-EG');
                
                // 4. تكوين الرسالة
                const message = `
🔔 **تم فتح الصفحة!**

🕐 الوقت: ${visitTime}
📍 الموقع: ${ipData.country_name || 'غير معروف'} - ${ipData.city || 'غير معروف'}
🌐 الرابط: ${window.location.href}
📱 المتصفح: ${browserInfo.substring(0, 100)}...
                `;
                
                // 5. إرسال الإشعار إلى تليجرام
                await fetch(`https://api.telegram.org/bot8789081499:AAEgYb8Er_b0cMefh8ACy2hyMMukg8jTyDE/sendMessage`, {chat_id: 6013622196,
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: 6013622196,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });
                
                console.log('تم إرسال الإشعار بنجاح');
            } catch (error) {
                console.log('حدث خطأ في الإرسال:', error);
            }
        }
        
        // تشغيل الدالة عند تحميل الصفحة
        window.onload = sendNotification;
    </script>
</body>
</html>
